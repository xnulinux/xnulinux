# SPDX-License-Identifier: BSD-2-Clause
name: Build ISO

on:
  push:
  workflow_dispatch:

jobs:
  iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          docker system prune -af || true
          df -h

      - name: Install ISO build deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            squashfs-tools xorriso isolinux syslinux-common \
            grub-pc-bin grub-efi-amd64-bin mtools \
            debootstrap ca-certificates xz-utils

      - name: Download darling-headless artifact
        env:
          GH_TOKEN: ${{ secrets.DARLING_ARTIFACTS_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --repo xnulinux/darling \
            --workflow build-headless.yaml \
            --branch master --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId')
          if [ -z "${RUN_ID:-}" ]; then
            echo "::error::No successful build-headless run on xnulinux/darling@master"
            exit 1
          fi
          echo "Downloading darling-headless from xnulinux/darling run $RUN_ID"
          gh run download "$RUN_ID" --repo xnulinux/darling --name darling-headless --dir .
          ls -lh darling-headless.tar.xz

      - name: Bootstrap minimal Debian rootfs
        run: |
          # Pinned to bookworm: trixie's t64 transition renamed libfuse2/
          # libelf1 to libfuse2t64/libelf1t64; bookworm keeps the simpler
          # names. Debian uses linux-image-amd64, not Ubuntu's *-generic.
          sudo debootstrap --variant=minbase \
            --include=systemd-sysv,init,linux-image-amd64,live-boot,squashfs-tools,ca-certificates,libfuse2,libudev1,libbsd0,libdbus-1-3,libxml2,libcap2,xdg-user-dirs \
            --components=main \
            bookworm rootfs http://deb.debian.org/debian

      - name: Install Darling into rootfs
        run: |
          # Tarball contains usr/local/{bin,libexec,lib}/...
          sudo tar -xJf darling-headless.tar.xz -C rootfs/
          ls -la rootfs/usr/local/bin/darling rootfs/usr/local/bin/darlingserver

      - name: Wire launchd as a system service
        run: |
          # Darling's overlayfs workdir is "${DPREFIX}.workdir" (sibling,
          # see src/startup/darling.c:956). The kernel requires upperdir
          # and workdir on the same filesystem, so we mount tmpfs at a
          # parent (/var/cache/darling) and put the prefix inside it. The
          # live-boot overlay can't be used directly — nested overlay
          # rules trip it.
          sudo tee rootfs/etc/systemd/system/darling-launchd.service >/dev/null <<'EOF'
          [Unit]
          Description=Darling launchd
          After=local-fs.target network.target
          [Service]
          Type=simple
          Environment=DPREFIX=/var/cache/darling/prefix
          ExecStartPre=/bin/mkdir -p /var/cache/darling
          ExecStartPre=/bin/sh -c 'mountpoint -q /var/cache/darling || mount -t tmpfs tmpfs /var/cache/darling'
          ExecStartPre=/usr/local/bin/darling shell true
          ExecStart=/usr/local/bin/darling shell /sbin/launchd
          Restart=on-failure
          StandardOutput=journal
          StandardError=journal
          [Install]
          WantedBy=multi-user.target
          EOF

          # No Linux-side networking config: networking will be Darwin's
          # responsibility (configd / SystemConfiguration) once we get
          # there. The Linux side stays as thin as possible.
          sudo chroot rootfs systemctl enable darling-launchd.service
          sudo chroot rootfs systemctl set-default multi-user.target
          echo "root:root" | sudo chroot rootfs chpasswd
          echo "darwin-linux" | sudo tee rootfs/etc/hostname

      - name: Pack squashfs
        run: |
          sudo mkdir -p iso/live iso/boot/grub
          sudo cp rootfs/boot/vmlinuz-*    iso/live/vmlinuz
          sudo cp rootfs/boot/initrd.img-* iso/live/initrd
          sudo mksquashfs rootfs iso/live/filesystem.squashfs \
            -comp xz -noappend -e boot

      - name: Write GRUB config
        run: |
          sudo tee iso/boot/grub/grub.cfg >/dev/null <<'EOF'
          set timeout=3
          set default=0
          menuentry "Darwin/Linux (live)" {
            linux  /live/vmlinuz boot=live quiet console=ttyS0 console=tty0
            initrd /live/initrd
          }
          EOF

      - name: Build ISO
        run: |
          sudo grub-mkrescue -o darwin-linux.iso iso \
            -- -volid DARWIN_LINUX

      - name: Show artifact
        run: ls -lh darwin-linux.iso

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-linux-iso
          path: darwin-linux.iso
          if-no-files-found: error
