# SPDX-License-Identifier: BSD-2-Clause
name: Build ISO

on:
  push:
  workflow_dispatch:

jobs:
  iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          docker system prune -af || true
          df -h

      - name: Install ISO build deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            squashfs-tools xorriso isolinux syslinux-common \
            grub-pc-bin grub-efi-amd64-bin mtools \
            debootstrap ca-certificates xz-utils \
            musl-tools

      - name: Compile xnulinux init
        run: |
          musl-gcc -static -O2 -Wall -o init/init init/init.c
          file init/init

      - name: Download darling-headless artifact
        env:
          GH_TOKEN: ${{ secrets.DARLING_ARTIFACTS_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --repo xnulinux/darling \
            --workflow build-headless.yaml \
            --branch master --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId')
          if [ -z "${RUN_ID:-}" ]; then
            echo "::error::No successful build-headless run on xnulinux/darling@master"
            exit 1
          fi
          echo "Downloading darling-headless from xnulinux/darling run $RUN_ID"
          gh run download "$RUN_ID" --repo xnulinux/darling --name darling-headless --dir .
          ls -lh darling-headless.tar.xz

      - name: Bootstrap minimal Debian rootfs
        run: |
          # Pinned to bookworm: trixie's t64 transition renamed libfuse2/
          # libelf1 to libfuse2t64/libelf1t64; bookworm keeps the simpler
          # names. Debian uses linux-image-amd64, not Ubuntu's *-generic.
          # SSH + DHCP added pragmatically so the VM is reachable from
          # the network. They're Linux userland — long-term plan is to
          # migrate networking to Darwin (configd / ipconfig) and SSH to
          # Darwin's openssh, but that needs syscall-translation work.
          sudo debootstrap --variant=minbase \
            --include=systemd-sysv,init,linux-image-amd64,live-boot,squashfs-tools,ca-certificates,libfuse2,libudev1,libbsd0,libdbus-1-3,libxml2,libcap2,xdg-user-dirs,iproute2,isc-dhcp-client,openssh-server \
            --components=main \
            bookworm rootfs http://deb.debian.org/debian

      - name: Install Darling into rootfs
        run: |
          # Tarball contains usr/local/{bin,libexec,lib}/...
          sudo tar -xJf darling-headless.tar.xz -C rootfs/
          ls -la rootfs/usr/local/bin/darling rootfs/usr/local/bin/darlingserver

      - name: Replace systemd as PID 1 with xnulinux init
        run: |
          # Overwrite /sbin/init with our own binary. The systemd files
          # stay on disk (lots of packages soft-depend on them) but they
          # never run — the kernel exec()s whatever is at /sbin/init.
          sudo install -m 0755 init/init rootfs/sbin/init
          echo "xnulinux" | sudo tee rootfs/etc/hostname
          echo "root:root" | sudo chroot rootfs chpasswd

          # SSH: allow root login w/ password. Remove host keys from
          # squashfs so init's ssh-keygen -A produces fresh keys per boot.
          sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' rootfs/etc/ssh/sshd_config
          sudo sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' rootfs/etc/ssh/sshd_config
          sudo rm -f rootfs/etc/ssh/ssh_host_*

          # openssh-server's postinst is inconsistent about creating the
          # sshd privsep user inside debootstrap's chroot — sometimes it
          # works, sometimes it silently fails. If it failed, sshd aborts
          # with "Privilege separation user sshd does not exist". Add the
          # user idempotently.
          sudo chroot rootfs sh -c 'id -u sshd >/dev/null 2>&1 || useradd --system --no-create-home --home-dir /run/sshd --shell /usr/sbin/nologin sshd'

          # Wrapper: SSH login for root drops directly into darling shell
          # (same Darwin environment the console init sets up).
          sudo tee rootfs/usr/local/bin/darling-login >/dev/null <<'EOF'
          #!/bin/sh
          export DPREFIX=/var/cache/darling/prefix
          export NO_COLOR=1 CLICOLOR=0
          unset LS_COLORS LSCOLORS
          exec /usr/local/bin/darling shell
          EOF
          sudo chmod +x rootfs/usr/local/bin/darling-login

          # Point root's login shell at the wrapper so SSH lands in Darwin
          sudo sed -i 's|^root:\([^:]*:[0-9]*:[0-9]*:[^:]*:[^:]*\):.*|root:\1:/usr/local/bin/darling-login|' rootfs/etc/passwd

      - name: Pack squashfs
        run: |
          sudo mkdir -p iso/live iso/boot/grub
          sudo cp rootfs/boot/vmlinuz-*    iso/live/vmlinuz
          sudo cp rootfs/boot/initrd.img-* iso/live/initrd
          sudo mksquashfs rootfs iso/live/filesystem.squashfs \
            -comp xz -noappend -e boot

      - name: Write GRUB config
        run: |
          sudo tee iso/boot/grub/grub.cfg >/dev/null <<'EOF'
          set timeout=1
          set default=0
          menuentry "xnulinux" {
            linux  /live/vmlinuz boot=live quiet loglevel=3 console=ttyS0 console=tty0
            initrd /live/initrd
          }
          EOF

      - name: Build ISO
        run: |
          sudo grub-mkrescue -o darwin-linux.iso iso \
            -- -volid DARWIN_LINUX

      - name: Show artifact
        run: ls -lh darwin-linux.iso

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-linux-iso
          path: darwin-linux.iso
          if-no-files-found: error
